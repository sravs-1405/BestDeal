<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde8ee"/>
      <stop offset="100%" stop-color="#ffd0de"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4809a"/>
      <stop offset="100%" stop-color="#a04060"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Rose border -->
  <rect width="64" height="64" rx="16" fill="none" stroke="#c0607a" stroke-width="2.5" opacity="0.4"/>
  <!-- BD monogram -->
  <text x="32" y="44" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="28" font-weight="700"
    fill="url(#txt)" letter-spacing="-2">BD</text>
</svg>
